<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Sistema de Monitoramento e Prevenção de Evasão Acadêmica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3B82F6;
            --primary-hover: #1E3A8A;
            --ai-color: #7C3AED;
            --bg-color: #0F172A;
            --surface-color: rgba(255, 255, 255, 0.97);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-soft: #94A3B8;
            --border-color: rgba(255, 255, 255, 0.5);
            --error-color: #ef4444;
            --success-color: #22c55e;
            --input-bg: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(-45deg, #EEF2FF, #E0E9FF, #EFF6FF, #DBEAFE);
            background-size: 400% 400%;
            animation: gradientBG 18s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── Orbs decorativos ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: #3B82F6; top: -120px; left: -120px; animation-duration: 12s; }
        .orb-2 { width: 400px; height: 400px; background: #7C3AED; bottom: -100px; right: -100px; animation-duration: 15s; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #06B6D4; top: 50%; left: 60%; animation-duration: 9s; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50%       { transform: translateY(-30px) scale(1.05); }
        }


        /* ── Layout principal ── */
        .page-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem 1rem;
            width: 100%;
            max-width: 480px;
        }

        /* ── Brand NEXUS ── */
        .brand-header {
            text-align: center;
            animation: slideDown 0.7s ease-out;
        }

        .brand-name {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 50%, #2563EB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.8rem;
            color: #3B82F6;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Card de login ── */
        .login-container {
            background-color: var(--surface-color);
            backdrop-filter: blur(20px);
            width: 100%;
            padding: 2.25rem 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 12px 40px -8px rgba(37, 99, 235, 0.15), 0 0 0 1px rgba(148,163,184,0.2);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #7C3AED, #3B82F6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary-color), var(--ai-color));
            border-radius: 0.875rem;
            margin-bottom: 0.875rem;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .logo-icon svg { width: 28px; height: 28px; color: white; }

        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: -0.025em; }

        p.subtitle { color: var(--text-secondary); font-size: 0.8rem; }

        /* ── Form ── */
        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
        }

        .input-wrapper { position: relative; }

        .input-wrapper > svg:first-child {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-soft);
            width: 18px; height: 18px;
            transition: color 0.2s;
        }

        .input-wrapper:focus-within > svg:first-child { color: var(--primary-color); }

        input {
            width: 100%;
            padding: 0.8rem 3rem 0.8rem 2.5rem;
            background-color: #F8FAFC;
            border: 1.5px solid #E2E8F0;
            border-radius: 0.625rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        input::placeholder { color: var(--text-soft); }

        .toggle-password {
            position: absolute;
            right: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-soft);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: var(--primary-color); }
        .toggle-password svg { width: 18px; height: 18px; }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary-color), var(--ai-color));
            color: white;
            border: none;
            border-radius: 0.625rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.35);
            margin-top: 0.25rem;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.45);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        .btn-submit.loading .spinner { display: inline-block; }
        .btn-submit.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .message {
            margin-top: 0.875rem;
            padding: 0.7rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s;
        }

        .message.error  { display: block; background: rgba(239,68,68,0.08); color: var(--error-color); border: 1px solid rgba(239,68,68,0.2); }
        .message.success{ display: block; background: rgba(34,197,94,0.08); color: var(--success-color); border: 1px solid rgba(34,197,94,0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Features pills ── */
        .features-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            animation: slideUp 0.6s ease-out 0.3s both;
        }

        .feature-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(255,255,255,0.75);
            border: 1px solid rgba(148,163,184,0.35);
            border-radius: 2rem;
            padding: 0.35rem 0.8rem;
            font-size: 0.7rem;
            color: #1E40AF;
            font-weight: 500;
            backdrop-filter: blur(8px);
        }

        .feature-pill svg { width: 12px; height: 12px; color: #2563EB; flex-shrink: 0; }

        /* ── Footer ── */
        .page-footer {
            font-size: 0.65rem;
            color: #3B82F6;
            text-align: center;
            animation: fadeIn 1s ease-out 0.5s both;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="page-wrapper">

        <!-- Card de Login -->
        <div class="login-container">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1>Acesse o Nexus</h1>
                <p class="subtitle">Bem-vindo de volta! Insira suas credenciais.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input type="text" id="matricula" name="matricula" placeholder="Ex: 2024001 ou admin" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggleSenha" aria-label="Mostrar senha">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <div class="spinner"></div>
                    <span class="btn-text">Entrar no sistema</span>
                </button>

                <div id="messageBox" class="message"></div>
            </form>

            <p style="text-align:center;margin-top:1.25rem;font-size:0.8rem;color:var(--text-secondary)">
                Não tem uma conta?
                <a href="/cadastro" style="color:var(--primary-color);font-weight:600;text-decoration:none">Criar conta</a>
            </p>
        </div>

        <!-- Feature pills -->
        <div class="features-row">
            <span class="feature-pill">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Análise de Desempenho
            </span>
            <span class="feature-pill">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Gestão de Turmas
            </span>
        </div>

        <!-- Footer -->
        <div class="page-footer">
            UniEvangélica &nbsp;·&nbsp; Curso de Inteligência Artificial &nbsp;·&nbsp; Projeto Semestral 2026/1
        </div>

    </div>

    <script>
        document.getElementById('toggleSenha').addEventListener('click', function() {
            const senhaInput = document.getElementById('senha');
            const eyeIcon = document.getElementById('eyeIcon');
            const isPassword = senhaInput.type === 'password';

            senhaInput.type = isPassword ? 'text' : 'password';
            this.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');

            eyeIcon.innerHTML = isPassword
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const matriculaInput = document.getElementById('matricula');
            const senhaInput = document.getElementById('senha');
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');

            let senhaValue = senhaInput.value.replace(/\D/g, '');
            if (senhaValue === '') senhaValue = senhaInput.value;

            messageBox.className = 'message';
            messageBox.textContent = '';

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        matricula: matriculaInput.value.trim(),
                        senha: senhaValue
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_perfil', data.perfil);
                    localStorage.setItem('nexus_nome', data.nome || '');

                    messageBox.textContent = 'Login realizado com sucesso! Redirecionando...';
                    messageBox.classList.add('success');

                    setTimeout(() => {
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                        window.location.href = '/dashboard';
                    }, 1200);
                } else {
                    throw new Error(data.erro || 'Falha ao realizar login.');
                }
            } catch (error) {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                messageBox.textContent = error.message;
                messageBox.classList.add('error');
            }
        });
    </script>
</body>
</html>
