<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus – SIMPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bokeh CDN -->
    <script src="https://cdn.bokeh.org/bokeh/release/3.9.0/bokeh.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.bokeh.org/bokeh/release/3.9.0/bokeh-widgets.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.bokeh.org/bokeh/release/3.9.0/bokeh-tables.min.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99,102,241,0.2);
            --accent: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #38bdf8;
            --bg-dark: #F0F4FF;
            --glass-bg: #FFFFFF;
            --glass-border: rgba(148,163,184,0.25);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --sidebar-w: 270px;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
        body{background:var(--bg-dark);color:var(--text-main);min-height:100vh;display:flex;overflow-x:hidden}

        .bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;z-index:-1;filter:blur(80px);opacity:.2;pointer-events:none}
        .glow-1{top:-200px;right:-200px;background:radial-gradient(circle,var(--primary-glow) 0%,transparent 70%)}
        .glow-2{bottom:-200px;left:-200px;background:radial-gradient(circle,rgba(244,63,94,.15) 0%,transparent 70%)}

        /* ... (o resto do CSS permanece o mesmo) ... */
    </style>
</head>
<body>
    <!-- ... (o HTML do sidebar e do header permanece o mesmo) ... -->

    <!-- ══ VIEW: DASHBOARD ══ -->
    <div id="view-dashboard" class="view">
        <!-- ... (KPIs e tabela de turmas permanecem os mesmos) ... -->

        <!-- ═══ PAINEL: DRILL-DOWN DA TURMA (AGORA COM BOKEH) ═══ -->
        <div id="dashAlunosPanel" style="display:none">
            <div class="grid-2-eq">
                <div class="block">
                    <div class="block-header">
                        <div><div class="block-title">Correlação: Média vs. Frequência</div><div class="block-sub">Análise de regressão linear</div></div>
                    </div>
                    <div id="chartScatter"></div>
                </div>
                <div class="block">
                    <div class="block-header">
                        <div><div class="block-title">Distribuição de Desempenho</div><div class="block-sub">Histograma de médias finais</div></div>
                    </div>
                    <div id="chartHistograma"></div>
                </div>
            </div>

            <div class="block">
                <div class="block-header">
                    <div><div class="block-title">Variabilidade por Disciplina</div><div class="block-sub">Boxplot comparativo de notas</div></div>
                </div>
                <div id="chartBoxplot"></div>
            </div>
        </div>
    </div>

    <!-- ... (outras views e modais permanecem os mesmos) ... -->

<script>
    // ... (lógica de tema, sidebar, utilitários, navegação, etc.) ...

    /* ══════════════════════════════════
       DRILL-DOWN DE TURMA (AGORA COM BOKEH)
    ══════════════════════════════════ */
    async function verTurma(turmaId) {
        // Mostra o painel de drill-down e o breadcrumb
        document.getElementById('dashBreadcrumb').style.display = 'flex';
        document.getElementById('dashTurmaLabel').textContent = `Turma ${turmaId}`;
        document.getElementById('dashTurmasPanel').style.display = 'none';
        document.getElementById('dashAlunosPanel').style.display = '';

        // Limpa gráficos antigos
        document.getElementById('chartScatter').innerHTML = '<p>Carregando gráfico...</p>';
        document.getElementById('chartHistograma').innerHTML = '<p>Carregando gráfico...</p>';
        document.getElementById('chartBoxplot').innerHTML = '<p>Carregando gráfico...</p>';

        // Busca os componentes dos gráficos Bokeh
        const chartData = await apiFetch(`/api/charts/turma/${turmaId}`);

        if (chartData && !chartData.erro) {
            // Renderiza o gráfico de dispersão
            if (chartData.scatter && chartData.scatter.div) {
                document.getElementById('chartScatter').innerHTML = chartData.scatter.div;
                const scatterScript = document.createElement('script');
                scatterScript.innerHTML = chartData.scatter.script;
                document.getElementById('chartScatter').appendChild(scatterScript);
            } else {
                document.getElementById('chartScatter').innerHTML = '<p>Não há dados suficientes para este gráfico.</p>';
            }

            // Renderiza o histograma
            if (chartData.histogram && chartData.histogram.div) {
                document.getElementById('chartHistograma').innerHTML = chartData.histogram.div;
                const histScript = document.createElement('script');
                histScript.innerHTML = chartData.histogram.script;
                document.getElementById('chartHistograma').appendChild(histScript);
            } else {
                document.getElementById('chartHistograma').innerHTML = '<p>Não há dados suficientes para este gráfico.</p>';
            }

            // Renderiza o boxplot
            if (chartData.boxplot && chartData.boxplot.div) {
                document.getElementById('chartBoxplot').innerHTML = chartData.boxplot.div;
                const boxScript = document.createElement('script');
                boxScript.innerHTML = chartData.boxplot.script;
                document.getElementById('chartBoxplot').appendChild(boxScript);
            } else {
                document.getElementById('chartBoxplot').innerHTML = '<p>Não há dados suficientes para este gráfico.</p>';
            }
        } else {
            document.getElementById('dashAlunosPanel').innerHTML = `<p>Erro ao carregar dados da turma: ${chartData?.erro || 'Erro desconhecido'}</p>`;
        }
    }

    function voltarTurmas() {
        document.getElementById('dashBreadcrumb').style.display = 'none';
        document.getElementById('dashTurmasPanel').style.display = '';
        document.getElementById('dashAlunosPanel').style.display = 'none';
        // Limpa os divs dos gráficos
        document.getElementById('chartScatter').innerHTML = '';
        document.getElementById('chartHistograma').innerHTML = '';
        document.getElementById('chartBoxplot').innerHTML = '';
    }

    // ... (o resto do JavaScript para outras views e inicialização) ...
</script>
</body>
</html>
